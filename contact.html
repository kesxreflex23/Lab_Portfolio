<main>

<h1>Contact Me</h1>

<form action="#" method="post">

<fieldset>

<legend>Personal Information</legend>

<label for="fullname">Full Name</label>
<input type="text" id="fullname" required maxlength="60">

<label for="email">Email</label>
<input type="email" id="email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" required>

<label for="age">Age</label>
<input type="number" id="age" min="18" max="100">

<label for="dob">Date of Birth</label>
<input type="date" id="dob">

</fieldset>

<fieldset>

<legend>Project Details</legend>

<label for="subject">Subject</label>

<select id="subject">

<optgroup label="Academic">
<option>Assignment</option>
<option>Project Discussion</option>
</optgroup>

<optgroup label="Professional">
<option>Internship</option>
<option>Collaboration</option>
</optgroup>

</select>

<label for="satisfaction">
Interest Level
</label>

<input type="range"
id="satisfaction"
min="1"
max="10">

<label for="message">
Message
</label>

<textarea
id="message"
rows="6"
placeholder="Enter your message"
maxlength="500">
</textarea>

</fieldset>

<fieldset>

<legend>Services Needed</legend>

<input type="checkbox" id="web">
<label for="web">Web Development</label>

<input type="checkbox" id="database">
<label for="database">Database Design</label>

<input type="checkbox" id="consultation">
<label for="consultation">Consultation</label>

</fieldset>

<fieldset>

<legend>Preferred Contact Method</legend>

<input type="radio" name="contact" id="emailContact">
<label for="emailContact">Email</label>

<input type="radio" name="contact" id="phoneContact">
<label for="phoneContact">Phone</label>

<input type="radio" name="contact" id="linkedinContact">
<label for="linkedinContact">LinkedIn</label>

</fieldset>

<button type="submit">
Send Message
</button>

</form>

</main>

</footer>
